version: "3.9"

# PostgreSQL master + 2 read replicas using streaming replication.
# Replicas can be scaled horizontally for read-heavy workloads (catalog browse, storefront).

services:
  pg-master:
    image: postgres:16
    container_name: pg-master
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    command: |
      postgres
        -c wal_level=logical
        -c max_replication_slots=10
        -c max_wal_senders=10
        -c hot_standby=on
        -c shared_buffers=2GB
        -c effective_cache_size=6GB
        -c work_mem=32MB
        -c maintenance_work_mem=512MB
        -c random_page_cost=1.1
        -c effective_io_concurrency=200
        -c max_worker_processes=8
        -c max_parallel_workers_per_gather=4
        -c shared_preload_libraries='pg_stat_statements,pg_partman_bgw,pgaudit'
        -c pg_stat_statements.track=all
    volumes:
      - pg-master-data:/var/lib/postgresql/data
      - ./pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ../../seed:/seed:ro
    ports:
      - "5432:5432"
    networks: [db]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  pg-replica-1:
    image: postgres:16
    container_name: pg-replica-1
    depends_on:
      pg-master: { condition: service_healthy }
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      PGUSER: ${PG_USER}
      PGPASSWORD: ${PG_PASSWORD}
    entrypoint: |
      bash -c '
        if [ ! -s "/var/lib/postgresql/data/PG_VERSION" ]; then
          pg_basebackup -h pg-master -U ${PG_REPL_USER:-replicator} -D /var/lib/postgresql/data -Fp -Xs -P -R
        fi
        exec docker-entrypoint.sh postgres -c hot_standby=on
      '
    volumes:
      - pg-replica-1-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks: [db]

  pg-replica-2:
    image: postgres:16
    container_name: pg-replica-2
    depends_on:
      pg-master: { condition: service_healthy }
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: ${PG_DB}
      PGUSER: ${PG_USER}
      PGPASSWORD: ${PG_PASSWORD}
    entrypoint: |
      bash -c '
        if [ ! -s "/var/lib/postgresql/data/PG_VERSION" ]; then
          pg_basebackup -h pg-master -U ${PG_REPL_USER:-replicator} -D /var/lib/postgresql/data -Fp -Xs -P -R
        fi
        exec docker-entrypoint.sh postgres -c hot_standby=on
      '
    volumes:
      - pg-replica-2-data:/var/lib/postgresql/data
    ports:
      - "5434:5432"
    networks: [db]

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: pgbouncer
    depends_on: [pg-master, pg-replica-1, pg-replica-2]
    environment:
      DATABASE_URL: "postgres://${PG_USER}:${PG_PASSWORD}@pg-master:5432/${PG_DB}"
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
      POOL_MODE: transaction
    ports:
      - "6432:5432"
    networks: [db]

volumes:
  pg-master-data:
  pg-replica-1-data:
  pg-replica-2-data:

networks:
  db:
    driver: bridge
