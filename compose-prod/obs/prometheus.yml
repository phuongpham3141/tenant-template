global:
  scrape_interval: 30s
  evaluation_interval: 30s
  external_labels:
    environment: prod

rule_files:
  - "/etc/prometheus/alerts/*.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: medusa-server
    static_configs:
      - targets: ["10.10.0.1:9000"]
        labels:
          tenant: acme
    metrics_path: /metrics

  - job_name: payload-cms
    static_configs:
      - targets: ["10.10.0.1:3000"]
        labels:
          tenant: acme
    metrics_path: /api/metrics

  - job_name: postgres
    static_configs:
      - targets: ["10.10.0.2:9187"]
        labels:
          tenant: acme

  - job_name: minio
    static_configs:
      - targets: ["10.10.0.3:9000"]
        labels:
          tenant: acme
    metrics_path: /minio/v2/metrics/cluster
