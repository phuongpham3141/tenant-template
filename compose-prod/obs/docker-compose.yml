name: tenant-${TENANT_ID}-obs

networks:
  obs_net:
    driver: bridge

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: always
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--web.enable-lifecycle'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./alertmanager.yml:/etc/prometheus/alertmanager.yml:ro
      - /srv/prometheus/data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - obs_net

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    restart: always
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - /srv/alertmanager/data:/alertmanager
    ports:
      - "9093:9093"
    networks:
      - obs_net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: always
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_GOOGLE_ENABLED: "true"
      GF_AUTH_GOOGLE_CLIENT_ID: ${GOOGLE_OAUTH_CLIENT_ID}
      GF_AUTH_GOOGLE_CLIENT_SECRET: ${GOOGLE_OAUTH_CLIENT_SECRET}
      GF_AUTH_GOOGLE_ALLOWED_DOMAINS: ${GRAFANA_ALLOWED_DOMAINS}
      GF_SERVER_ROOT_URL: https://metrics.${TENANT_DOMAIN}
    volumes:
      - /srv/grafana/data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    networks:
      - obs_net

  loki:
    image: grafana/loki:latest
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ../../observability/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - /srv/loki/data:/loki
    ports:
      - "3100:3100"
    networks:
      - obs_net
