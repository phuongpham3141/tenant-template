global:
  resolve_timeout: 5m

route:
  receiver: default
  group_by: [alertname, severity]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    - match:
        severity: critical
      receiver: pagerduty

receivers:
  - name: default
    email_configs:
      - to: ops@huayuesc.com
        from: alerts@huayuesc.com
        smarthost: smtp.example.com:587
        auth_username: alerts@huayuesc.com
        auth_password_file: /run/secrets/smtp_password

  - name: pagerduty
    pagerduty_configs:
      - service_key_file: /run/secrets/pagerduty_key
