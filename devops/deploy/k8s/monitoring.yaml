apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata: { name: csr-services, namespace: monitoring }
spec:
  namespaceSelector: { matchNames: [csr] }
  selector: { matchLabels: { app.kubernetes.io/part-of: cybersilkroads } }
  endpoints:
    - port: http
      path: /metrics
      interval: 30s
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata: { name: csr-rules, namespace: monitoring }
spec:
  groups:
    - name: csr.availability
      rules:
        - alert: ServiceDown
          expr: up{job=~"medusa|payload|storefront"} == 0
          for: 2m
          labels: { severity: critical }
          annotations: { summary: "{{ $labels.job }} is down" }
