apiVersion: apps/v1
kind: Deployment
metadata:
  name: payload
  namespace: csr
spec:
  replicas: 2
  selector: { matchLabels: { app: payload } }
  template:
    metadata: { labels: { app: payload } }
    spec:
      containers:
        - name: payload
          image: ghcr.io/CHANGE_ME/payload:latest
          ports: [{ name: http, containerPort: 3000 }]
          envFrom:
            - secretRef: { name: payload-secrets }
            - configMapRef: { name: payload-config }
          resources:
            requests: { cpu: "300m", memory: "768Mi" }
            limits: { cpu: "1500m", memory: "2Gi" }
          readinessProbe:
            httpGet: { path: /api/healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata: { name: payload, namespace: csr }
spec:
  selector: { app: payload }
  ports: [{ name: http, port: 80, targetPort: 3000 }]
