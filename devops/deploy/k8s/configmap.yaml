metadata: { name: medusa-config, namespace: csr }
data:
  NODE_ENV: "production"
  STORE_CORS: "https://shop.huayuesc.vn"
  ADMIN_CORS: "https://admin.huayuesc.vn"
  AUTH_CORS: "https://shop.huayuesc.vn,https://admin.huayuesc.vn"
  PG_POOL_MAX: "30"
  MEDUSA_WORKER_MODE: "shared"
  S3_REGION: "ap-southeast-1"
  S3_BUCKET: "csr-media"
