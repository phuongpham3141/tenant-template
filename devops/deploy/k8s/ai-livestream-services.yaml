apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-director
  namespace: csr
spec:
  replicas: 3
  selector: { matchLabels: { app: ai-director } }
  template:
    metadata: { labels: { app: ai-director } }
    spec:
      containers:
        - name: director
          image: ghcr.io/CHANGE_ME/medusa:latest
          command: ["node", "dist/workers/standalone-director.js"]
          envFrom:
            - secretRef: { name: medusa-secrets }
            - configMapRef: { name: medusa-config }
          env:
            - { name: AI_DIRECTOR_CONCURRENCY, value: "20" }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2000m", memory: "4Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-chat-responder
  namespace: csr
spec:
  replicas: 4
  selector: { matchLabels: { app: ai-chat-responder } }
  template:
    metadata: { labels: { app: ai-chat-responder } }
    spec:
      containers:
        - name: responder
          image: ghcr.io/CHANGE_ME/medusa:latest
          command: ["node", "dist/workers/standalone-chat.js"]
          envFrom:
            - secretRef: { name: medusa-secrets }
            - configMapRef: { name: medusa-config }
          env:
            - { name: AI_CHAT_CONCURRENCY, value: "30" }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2000m", memory: "4Gi" }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: simulcast-mux
  namespace: csr
spec:
  serviceName: simulcast-mux
  replicas: 2
  selector: { matchLabels: { app: simulcast-mux } }
  template:
    metadata: { labels: { app: simulcast-mux } }
    spec:
      containers:
        - name: mux
          image: ghcr.io/CHANGE_ME/medusa:latest
          command: ["node", "dist/workers/standalone-mux.js"]
          envFrom:
            - secretRef: { name: medusa-secrets }
            - configMapRef: { name: medusa-config }
          env:
            - { name: MUX_HLS_ROOT, value: "/var/lib/csr/hls" }
            - { name: MUX_FIFO_ROOT, value: "/var/lib/csr/fifo" }
          volumeMounts:
            - { name: hls, mountPath: /var/lib/csr/hls }
            - { name: fifo, mountPath: /var/lib/csr/fifo }
          resources:
            requests: { cpu: "1000m", memory: "2Gi" }
            limits: { cpu: "4000m", memory: "8Gi" }
  volumeClaimTemplates:
    - metadata: { name: hls }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 50Gi } } }
    - metadata: { name: fifo }
      spec: { accessModes: [ReadWriteOnce], resources: { requests: { storage: 5Gi } } }
---
apiVersion: v1
kind: Service
metadata: { name: simulcast-mux, namespace: csr }
spec:
  clusterIP: None
  selector: { app: simulcast-mux }
  ports: [{ port: 80 }]
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: ai-247-scheduler, namespace: csr }
spec:
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: job
              image: ghcr.io/CHANGE_ME/medusa:latest
              command: ["node", "dist/jobs/ai-247-scheduler.js"]
              envFrom: [{ secretRef: { name: medusa-secrets } }]
---
apiVersion: batch/v1
kind: CronJob
metadata: { name: gpu-quota-enforcer, namespace: csr }
spec:
  schedule: "*/5 * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: job
              image: ghcr.io/CHANGE_ME/medusa:latest
              command: ["node", "dist/jobs/gpu-quota-enforcer.js"]
              envFrom: [{ secretRef: { name: medusa-secrets } }]
