apiVersion: apps/v1
kind: Deployment
metadata:
  name: medusa
  namespace: csr
spec:
  replicas: 3
  selector: { matchLabels: { app: medusa } }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxSurge: 1, maxUnavailable: 0 }
  template:
    metadata:
      labels: { app: medusa }
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9000"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: medusa
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector: { matchExpressions: [{ key: app, operator: In, values: [medusa] }] }
                topologyKey: topology.kubernetes.io/zone
      containers:
        - name: medusa
          image: ghcr.io/CHANGE_ME/medusa:latest
          ports:
            - { name: http, containerPort: 9000 }
          envFrom:
            - secretRef: { name: medusa-secrets }
            - configMapRef: { name: medusa-config }
          resources:
            requests: { cpu: "500m", memory: "1Gi" }
            limits: { cpu: "2000m", memory: "4Gi" }
          readinessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            initialDelaySeconds: 30
            periodSeconds: 15
          lifecycle:
            preStop:
              exec: { command: ["sh", "-c", "sleep 10"] }
---
apiVersion: v1
kind: Service
metadata:
  name: medusa
  namespace: csr
spec:
  selector: { app: medusa }
  ports:
    - { name: http, port: 80, targetPort: 9000 }
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: medusa-hpa
  namespace: csr
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: medusa
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource: { name: cpu, target: { type: Utilization, averageUtilization: 65 } }
    - type: Resource
      resource: { name: memory, target: { type: Utilization, averageUtilization: 75 } }
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: medusa-pdb
  namespace: csr
spec:
  minAvailable: 2
  selector: { matchLabels: { app: medusa } }
