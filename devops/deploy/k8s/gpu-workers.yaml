apiVersion: v1
kind: Namespace
metadata:
  name: csr-gpu
  labels:
    nvidia.com/gpu.present: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-tts-render
  namespace: csr-gpu
spec:
  replicas: 2
  selector: { matchLabels: { app: ai-tts-render } }
  template:
    metadata: { labels: { app: ai-tts-render } }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
      nodeSelector:
        nvidia.com/gpu.product: "T4"
      containers:
        - name: worker
          image: ghcr.io/CHANGE_ME/medusa:latest
          command: ["node", "dist/workers/standalone-tts.js"]
          envFrom:
            - secretRef: { name: medusa-secrets }
            - configMapRef: { name: medusa-config }
          env:
            - { name: AI_TTS_CONCURRENCY, value: "4" }
          resources:
            requests: { cpu: "1000m", memory: "4Gi", "nvidia.com/gpu": "0" }  # ElevenLabs is API-based; bump GPU when using Coqui
            limits: { cpu: "4000m", memory: "8Gi" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-video-render
  namespace: csr-gpu
spec:
  replicas: 2
  selector: { matchLabels: { app: ai-video-render } }
  template:
    metadata: { labels: { app: ai-video-render } }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
      nodeSelector:
        nvidia.com/gpu.product: "A10G"
      containers:
        - name: worker
          image: ghcr.io/CHANGE_ME/medusa:latest
          command: ["node", "dist/workers/standalone-video.js"]
          envFrom:
            - secretRef: { name: medusa-secrets }
            - configMapRef: { name: medusa-config }
          env:
            - { name: AI_VIDEO_CONCURRENCY, value: "2" }
          resources:
            requests: { cpu: "2000m", memory: "8Gi", "nvidia.com/gpu": "1" }
            limits: { cpu: "8000m", memory: "16Gi", "nvidia.com/gpu": "1" }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wav2lip
  namespace: csr-gpu
spec:
  replicas: 1
  selector: { matchLabels: { app: wav2lip } }
  template:
    metadata: { labels: { app: wav2lip } }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
      nodeSelector:
        nvidia.com/gpu.product: "A10G"
      containers:
        - name: wav2lip
          image: ghcr.io/CHANGE_ME/wav2lip:latest
          ports: [{ containerPort: 8500 }]
          resources:
            requests: { cpu: "2000m", memory: "8Gi", "nvidia.com/gpu": "1" }
            limits: { cpu: "8000m", memory: "16Gi", "nvidia.com/gpu": "1" }
---
apiVersion: v1
kind: Service
metadata: { name: wav2lip, namespace: csr-gpu }
spec:
  selector: { app: wav2lip }
  ports: [{ port: 8500, targetPort: 8500 }]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coqui-tts
  namespace: csr-gpu
spec:
  replicas: 1
  selector: { matchLabels: { app: coqui-tts } }
  template:
    metadata: { labels: { app: coqui-tts } }
    spec:
      tolerations:
        - { key: nvidia.com/gpu, operator: Exists, effect: NoSchedule }
      nodeSelector:
        nvidia.com/gpu.product: "T4"
      containers:
        - name: coqui
          image: ghcr.io/coqui-ai/tts-cuda:latest
          ports: [{ containerPort: 5002 }]
          args: ["--model_name", "tts_models/multilingual/multi-dataset/xtts_v2", "--port", "5002"]
          resources:
            requests: { cpu: "2000m", memory: "8Gi", "nvidia.com/gpu": "1" }
            limits: { cpu: "4000m", memory: "16Gi", "nvidia.com/gpu": "1" }
---
apiVersion: v1
kind: Service
metadata: { name: coqui-tts, namespace: csr-gpu }
spec:
  selector: { app: coqui-tts }
  ports: [{ port: 5002, targetPort: 5002 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: ai-video-render-hpa, namespace: csr-gpu }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: ai-video-render }
  minReplicas: 1
  maxReplicas: 8
  metrics:
    - type: External
      external:
        metric:
          name: bullmq_video_render_waiting
        target: { type: AverageValue, averageValue: "5" }
