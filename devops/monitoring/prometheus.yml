global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: csr-prod
    environment: production

rule_files:
  - /etc/prometheus/rules/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
  - job_name: medusa
    metrics_path: /metrics
    static_configs:
      - targets: ["medusa:9000"]
        labels: { service: medusa }
  - job_name: payload
    metrics_path: /metrics
    static_configs:
      - targets: ["payload:3000"]
        labels: { service: payload }
  - job_name: storefront
    metrics_path: /api/metrics
    static_configs:
      - targets: ["storefront:3000"]
        labels: { service: storefront }
  - job_name: postgres-exporter
    static_configs:
      - targets: ["pg-exporter:9187"]
  - job_name: redis-exporter
    static_configs:
      - targets: ["redis-exporter:9121"]
  - job_name: clickhouse
    metrics_path: /metrics
    static_configs:
      - targets: ["clickhouse:9363"]
  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]
  - job_name: caddy
    metrics_path: /metrics
    static_configs:
      - targets: ["caddy:2019"]
