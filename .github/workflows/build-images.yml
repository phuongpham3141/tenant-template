name: Build and Push Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tenant_id:
        description: "Tenant ID (e.g. acme). Empty = template build."
        required: false
        default: ""
      version:
        description: "Version tag"
        required: true
        default: "latest"

env:
  REGISTRY: ghcr.io
  OWNER: phuongpham3141

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [medusa, payload, storefront]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image name
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tenant_id }}" ]; then
            SUFFIX="${{ matrix.service }}-${{ github.event.inputs.tenant_id }}"
          else
            SUFFIX="${{ matrix.service }}-template"
          fi
          VERSION="${{ github.event.inputs.version || github.ref_name }}"
          echo "image=${{ env.REGISTRY }}/${{ env.OWNER }}/${SUFFIX}:${VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${{ env.REGISTRY }}/${{ env.OWNER }}/${SUFFIX}:latest" >> "$GITHUB_OUTPUT"
          echo "cache_ref=${{ env.REGISTRY }}/${{ env.OWNER }}/${SUFFIX}:cache" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./${{ matrix.service }}
          target: production
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}
            ${{ steps.meta.outputs.image_latest }}
          cache-from: type=registry,ref=${{ steps.meta.outputs.cache_ref }}
          cache-to: type=registry,ref=${{ steps.meta.outputs.cache_ref }},mode=max
