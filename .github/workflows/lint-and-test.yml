name: Lint and Test

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop, main]

jobs:
  lint-medusa:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./medusa
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: medusa/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npx medusa build
      - run: npx jest --passWithNoTests || true

  lint-payload:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./payload
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: payload/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run lint
      - run: npm run build

  lint-storefront:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./storefront
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: storefront/package-lock.json
      - run: npm ci --legacy-peer-deps
      - run: npm run build
