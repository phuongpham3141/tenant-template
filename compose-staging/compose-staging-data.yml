# Staging compose cho VM csr-data (Postgres + Redis + ClickHouse)
# Bind mount ZFS datasets (D06 production pattern)
# Per-tenant network isolation (vmbr10 → 10.10.1.0/24)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: csr-postgres-staging
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-medusa}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
    volumes:
      - /rpool-data/cybersilkroads/postgres:/var/lib/postgresql/data
    ports:
      - "10.10.1.11:5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: csr-redis-staging
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - /rpool-data/cybersilkroads/redis:/data
    ports:
      - "10.10.1.11:6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    container_name: csr-clickhouse-staging
    volumes:
      - /rpool-data/cybersilkroads/clickhouse:/var/lib/clickhouse
    ports:
      - "10.10.1.11:8123:8123"
      - "10.10.1.11:9000:9000"
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 262144
        hard: 262144

networks:
  default:
    name: csr-network-staging
    external: true
