global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: dev

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'medusa-server'
    static_configs:
      - targets: ['medusa-server:9000']
    metrics_path: '/metrics'

  - job_name: 'payload-cms'
    static_configs:
      - targets: ['payload-cms:3000']
    metrics_path: '/api/metrics'

  - job_name: 'minio'
    static_configs:
      - targets: ['minio:9000']
    metrics_path: '/minio/v2/metrics/cluster'
