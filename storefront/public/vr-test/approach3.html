<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Approach 3 — CSS pseudo-fullscreen ONLY</title>
<style>
  body{font-family:system-ui,Arial;max-width:1200px;margin:16px auto;padding:0 16px}
  body.fs-lock{overflow:hidden}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:#666;font-size:13px;margin:0 0 16px}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  button{padding:10px 18px;background:#0066cc;color:#fff;border:0;border-radius:4px;font-weight:bold;cursor:pointer;font-size:14px}
  button:hover{background:#005ab3}
  .log{background:#0a0a0a;color:#0f0;font-family:Consolas,monospace;font-size:12px;padding:10px;border-radius:4px;height:120px;overflow-y:auto;margin:12px 0;white-space:pre-wrap}
  .log .ok{color:#6f6}

  #wrap{position:relative;width:100%;height:600px;background:#000;border:1px solid #ccc;border-radius:6px;overflow:hidden}
  #wrap.fs{position:fixed!important;inset:0;width:100vw;height:100vh;z-index:99999;border-radius:0;border:0}
  #wrap iframe{width:100%;height:100%;border:0}
  .ov1{position:absolute;top:0;left:0;width:280px;height:70px;background:linear-gradient(90deg,#0066cc,#003d7a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:6px;z-index:10}
  .ov2{position:absolute;bottom:0;right:0;width:140px;height:100px;background:linear-gradient(135deg,#0066cc,#003d7a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;text-align:center;line-height:1.3;border-radius:6px;z-index:10}
  .exit-btn{position:absolute;top:16px;right:16px;background:#fff;color:#0066cc;padding:8px 14px;border-radius:4px;font-weight:bold;border:0;cursor:pointer;z-index:20;box-shadow:0 2px 8px rgba(0,0,0,.3);display:none}
  #wrap.fs .exit-btn{display:block}
  .back{display:inline-block;margin-bottom:8px;color:#0066cc;text-decoration:none;font-size:13px}
</style>
</head>
<body>
  <a class="back" href="index.html">← Về trang index</a>
  <h1>Approach 3 — CSS pseudo-fullscreen ONLY (không gọi API)</h1>
  <p class="sub">Click → toggle class <code>.fs</code> trên wrapper. Wrapper có <code>position:fixed; inset:0; z-index:99999</code> → phủ kín màn hình. Domain giữ nguyên Cybersilkroads. Esc thoát.</p>

  <div class="row">
    <button id="fs">⛶ Toàn màn hình</button>
    <button id="clear">🗑 Clear log</button>
  </div>
  <div class="log" id="log"></div>

  <div id="wrap">
    <iframe src="https://world-port.made-in-china.com/viewVR?comId=eKtTcaCAvhrm"
            allow="accelerometer; gyroscope; magnetometer; vr; xr-spatial-tracking"></iframe>
    <div class="ov1">🏭 OPPEIN HOME GROUP</div>
    <div class="ov2"><span>OPPEIN<br/>HOME GROUP</span></div>
    <button class="exit-btn" id="exit">✕ Thoát (Esc)</button>
  </div>

<script>
  const log = document.getElementById('log');
  const wrap = document.getElementById('wrap');
  function L(msg, cls){
    const t = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    if(cls) line.className = cls;
    line.textContent = `[${t}] ${msg}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }
  document.getElementById('clear').onclick = ()=> log.innerHTML='';

  function toggle(){
    const on = !wrap.classList.contains('fs');
    wrap.classList.toggle('fs', on);
    document.body.classList.toggle('fs-lock', on);
    L((on?'✅ ENTER':'⬇ EXIT') + ' pseudo-fullscreen — class.fs = ' + on, 'ok');
  }
  document.getElementById('fs').onclick = toggle;
  document.getElementById('exit').onclick = toggle;

  document.addEventListener('keydown', (e)=>{
    if(e.key === 'Escape' && wrap.classList.contains('fs')) toggle();
  });
</script>
</body>
</html>
