<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Approach 5 — window.open popup</title>
<style>
  body{font-family:system-ui,Arial;max-width:1200px;margin:16px auto;padding:0 16px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:#666;font-size:13px;margin:0 0 16px}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  button{padding:10px 18px;background:#0066cc;color:#fff;border:0;border-radius:4px;font-weight:bold;cursor:pointer;font-size:14px}
  .log{background:#0a0a0a;color:#0f0;font-family:Consolas,monospace;font-size:12px;padding:10px;border-radius:4px;height:120px;overflow-y:auto;margin:12px 0;white-space:pre-wrap}
  .log .ok{color:#6f6}
  .log .err{color:#f66}
  #wrap{position:relative;width:100%;height:600px;background:#000;border:1px solid #ccc;border-radius:6px;overflow:hidden}
  #wrap iframe{width:100%;height:100%;border:0}
  .back{display:inline-block;margin-bottom:8px;color:#0066cc;text-decoration:none;font-size:13px}
</style>
</head>
<body>
  <a class="back" href="index.html">← Về trang index</a>
  <h1>Approach 5 — Mở popup window mới chứa iframe (full screen popup)</h1>
  <p class="sub">Click → mở cửa sổ mới ở chế độ full screen (kích thước = screen.width/height). Cửa sổ đó vẫn là Cybersilkroads (page <code>/vr-test/popup.html</code>) chứa iframe.</p>

  <div class="row">
    <button id="fs">⛶ Mở popup full screen</button>
    <button id="clear">🗑 Clear log</button>
  </div>
  <div class="log" id="log"></div>

  <div id="wrap">
    <iframe src="https://world-port.made-in-china.com/viewVR?comId=eKtTcaCAvhrm"
            allow="accelerometer; gyroscope; magnetometer; vr; xr-spatial-tracking"></iframe>
  </div>

<script>
  const log = document.getElementById('log');
  function L(msg, cls){
    const t = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    if(cls) line.className = cls;
    line.textContent = `[${t}] ${msg}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }
  document.getElementById('clear').onclick = ()=> log.innerHTML='';

  document.getElementById('fs').onclick = ()=>{
    const w = screen.availWidth, h = screen.availHeight;
    const features = `width=${w},height=${h},left=0,top=0,fullscreen=yes,menubar=no,toolbar=no,location=no,status=no`;
    const win = window.open('popup.html', 'vr_fullscreen', features);
    if(!win){
      L('❌ Popup BỊ CHẶN bởi browser. Cho phép popup cho domain này rồi thử lại.','err');
    } else {
      L('✅ Popup mở: ' + w + 'x' + h, 'ok');
      win.focus();
    }
  };
</script>
</body>
</html>
