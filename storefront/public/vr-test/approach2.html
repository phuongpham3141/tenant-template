<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Approach 2 — Native FS trên iframe trực tiếp</title>
<style>
  body{font-family:system-ui,Arial;max-width:1200px;margin:16px auto;padding:0 16px}
  h1{font-size:20px;margin:0 0 4px}
  .sub{color:#666;font-size:13px;margin:0 0 16px}
  .row{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  button{padding:10px 18px;background:#0066cc;color:#fff;border:0;border-radius:4px;font-weight:bold;cursor:pointer;font-size:14px}
  button:hover{background:#005ab3}
  .log{background:#0a0a0a;color:#0f0;font-family:Consolas,monospace;font-size:12px;padding:10px;border-radius:4px;height:120px;overflow-y:auto;margin:12px 0;white-space:pre-wrap}
  .log .err{color:#f66}
  .log .ok{color:#6f6}
  #wrap{position:relative;width:100%;height:600px;background:#000;border:1px solid #ccc;border-radius:6px;overflow:hidden}
  #fr{width:100%;height:100%;border:0}
  .ov1{position:absolute;top:0;left:0;width:280px;height:70px;background:linear-gradient(90deg,#0066cc,#003d7a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:bold;border-radius:6px;z-index:10}
  .back{display:inline-block;margin-bottom:8px;color:#0066cc;text-decoration:none;font-size:13px}
</style>
</head>
<body>
  <a class="back" href="index.html">← Về trang index</a>
  <h1>Approach 2 — Native Fullscreen API trên iframe trực tiếp</h1>
  <p class="sub">Click → gọi <code>iframe.requestFullscreen()</code>. Lưu ý: overlay sẽ KHÔNG còn vì chỉ iframe được fullscreen.</p>

  <div class="row">
    <button id="fs">⛶ Toàn màn hình iframe</button>
    <button id="clear">🗑 Clear log</button>
  </div>
  <div class="log" id="log"></div>

  <div id="wrap">
    <iframe id="fr"
            src="https://world-port.made-in-china.com/viewVR?comId=eKtTcaCAvhrm"
            allow="accelerometer; gyroscope; magnetometer; vr; xr-spatial-tracking; fullscreen"
            allowfullscreen></iframe>
    <div class="ov1">🏭 OPPEIN HOME GROUP</div>
  </div>

<script>
  const log = document.getElementById('log');
  function L(msg, cls){
    const t = new Date().toLocaleTimeString();
    const line = document.createElement('div');
    if(cls) line.className = cls;
    line.textContent = `[${t}] ${msg}`;
    log.appendChild(line);
    log.scrollTop = log.scrollHeight;
  }
  document.getElementById('clear').onclick = ()=> log.innerHTML='';

  document.getElementById('fs').onclick = ()=>{
    const fr = document.getElementById('fr');
    L('Click → gọi iframe.requestFullscreen()...');
    if(document.fullscreenElement){
      document.exitFullscreen().then(()=>L('Exit FS OK','ok')).catch(e=>L('Exit error: '+e.message,'err'));
      return;
    }
    const fn = fr.requestFullscreen || fr.webkitRequestFullscreen;
    if(!fn){ L('Browser KHÔNG hỗ trợ requestFullscreen','err'); return; }
    fn.call(fr)
      .then(()=> L('✅ iframe.requestFullscreen RESOLVED','ok'))
      .catch(e=> L('❌ REJECTED: ' + e.name + ' — ' + e.message, 'err'));
  };

  document.addEventListener('fullscreenchange', ()=>{
    L('🔔 fullscreenchange → ' + (document.fullscreenElement ? document.fullscreenElement.tagName : 'null'));
  });
</script>
</body>
</html>
